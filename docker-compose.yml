version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: expense-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - expense-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: expense-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/expense-tracker
      - PORT=5000
    depends_on:
      - database
    networks:
      - expense-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: expense-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - expense-network

volumes:
  mongo-data:

networks:
  expense-network:
    driver: bridge
